global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8001"]
  - job_name: order-service
    static_configs:
      - targets: ["order-service:8010"]
  - job_name: inventory-service
    static_configs:
      - targets: ["inventory-service:8020"]
  - job_name: payment-service
    static_configs:
      - targets: ["payment-service:8030"]
  - job_name: shipping-service
    static_configs:
      - targets: ["shipping-service:8040"]
  - job_name: saga-orchestrator
    static_configs:
      - targets: ["saga-orchestrator:8050"]
  - job_name: dlq-monitor
    static_configs:
      - targets: ["dlq-monitor:8060"]
