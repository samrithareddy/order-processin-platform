---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inventory-service-kafka-lag
  namespace: order-processing
spec:
  scaleTargetRef:
    name: inventory-service
  minReplicaCount: 2
  maxReplicaCount: 8
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: inventory-service
        topic: order.accepted
        lagThreshold: "500"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
