apiVersion: v1
kind: ConfigMap
metadata:
  name: order-platform-config
  namespace: order-processing
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
  AUTH_TOKEN: local-dev-token
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: order-processing
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: order-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: app
          image: order-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "order_platform.services.api_gateway.app:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: order-platform-config
          env:
            - name: SERVICE_NAME
              value: api-gateway
            - name: API_GATEWAY_METRICS_PORT
              value: "8001"
          ports:
            - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: order-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: worker
          image: order-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "order_platform.services.order_service.worker"]
          envFrom:
            - configMapRef:
                name: order-platform-config
          env:
            - name: SERVICE_NAME
              value: order-service
            - name: ORDER_METRICS_PORT
              value: "8010"
          ports:
            - containerPort: 8010
---
