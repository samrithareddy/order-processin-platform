apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inventory-service-lag-scaler
  namespace: order-processing
spec:
  scaleTargetRef:
    name: inventory-service
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: inventory-service
        topic: order.accepted
        lagThreshold: "500"
---
